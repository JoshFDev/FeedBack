    const resumen = data.reduce((acc, product) => {

        // acumulamos el total de unidades
        acc.totalUnits += product.units;

        // guardamos los nombres de los productos en un arreglo
        acc.products.push(product.name);

        // SIEMPRE hay que regresar el acumulador
        return acc;
        
    }, {
        totalUnits: 0,   // valor inicial del total
        products: []     // arreglo vacío inicial
    });

    // mostramos el resultado
    console.log(resumen);
