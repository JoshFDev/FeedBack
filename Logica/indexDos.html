<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1></h1>
    <script>
        let numUno = prompt("Ingrese el primer número:");
        let numDos = prompt("Ingrese el segundo número:");
        let numTres = prompt("Ingrese el tercer número:");
        
        let promedio = (parseFloat(numUno) + parseFloat(numDos) + parseFloat(numTres)) / 3;

        console.log(`El promedio de los números es: ${promedio}`);
    </script>
</body>
</html>
