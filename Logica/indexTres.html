<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numLitros = prompt("Ingrese la cantidad de litros:");
        let numKm = prompt("Ingrese la cantidad de kilómetros recorridos:");
        let consumo = parseFloat(numLitros) / parseFloat(numKm) * 100;

        console.log(`El consumo de combustible es: ${consumo.toFixed(2)} litros por cada 100 km.`);

        

    </script>
</body>
</html>
